// Top-level build file where you can add configuration options common to all sub-projects/modules.
import java.util.Properties

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

def asyncStorageAndroidLocalRepo = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine("node", "--print", "require.resolve('@react-native-async-storage/async-storage/package.json', { paths: [require.resolve('react-native/package.json')] })")
  }.standardOutput.asText.get().trim(),
  "../android/local_repo"
)

def localProperties = new Properties()
def localPropertiesFile = new File(rootDir, "local.properties")
if (localPropertiesFile.exists()) {
  localPropertiesFile.withInputStream { stream ->
    localProperties.load(stream)
  }
}

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }
    maven {
      // AsyncStorage 3.x publishes its Android artifact into a local Maven repo inside node_modules.
      url(asyncStorageAndroidLocalRepo)
    }

    google()
    mavenCentral()
    maven {
      url 'https://maven.pkg.github.com/facebook/meta-wearables-dat-android'
      credentials {
        username = ""
        password = System.getenv("GITHUB_TOKEN") ?: localProperties.getProperty("github_token") ?: ""
      }
    }
    maven { url 'https://www.jitpack.io' }
  }

  configurations.all {
    resolutionStrategy {
      force "androidx.core:core:1.15.0"
      force "androidx.core:core-ktx:1.15.0"
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
