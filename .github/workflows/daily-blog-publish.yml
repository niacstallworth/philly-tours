name: Daily Blog Publish

on:
  schedule:
    - cron: "15 11 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: Optional YYYY-MM-DD publication date
        required: false
        type: string
      force:
        description: Generate even if a post already exists for the date
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-blog-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Generate, build, commit, and deploy blog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    env:
      BLOG_TIME_ZONE: America/New_York
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BLOG_MODEL: ${{ vars.OPENAI_BLOG_MODEL || 'gpt-5' }}
      OPENAI_BLOG_IMAGE_MODEL: ${{ vars.OPENAI_BLOG_IMAGE_MODEL || 'gpt-image-1' }}
      EXPO_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.EXPO_PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY }}
      EXPO_PUBLIC_GOOGLE_MAPS_JS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_JS_API_KEY }}
      EXPO_PUBLIC_ONESIGNAL_APP_ID: ${{ secrets.EXPO_PUBLIC_ONESIGNAL_APP_ID }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate blog source
        run: |
          args=()
          if [ -n "${{ inputs.date }}" ]; then
            args+=(--date "${{ inputs.date }}")
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          node scripts/generate-daily-blog-post.mjs "${args[@]}"

      - name: Build static webapp
        run: npm run webapp:build

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated blog update
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "philly-tours-blog-bot"
          git config user.email "actions@github.com"
          git add content/blog webapp/assets/blog webapp/blog webapp/blog-data.js webapp/rss.xml webapp/sitemap.xml webapp/robots.txt
          git commit -m "blog: publish daily founder story"
          git push

      - name: Deploy to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web-dist --project-name philly-tours --branch main --commit-dirty=true

      - name: Nothing to publish
        if: steps.changes.outputs.changed != 'true'
        run: echo "No blog changes generated; deployment skipped."
