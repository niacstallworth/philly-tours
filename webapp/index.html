<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070d" />
    <meta
      name="description"
      content="Explore story-driven Philadelphia tours with cinematic route previews, AR highlights, and a premium mobile web companion."
    />
    <meta property="og:title" content="Philly AR Tours" />
    <meta
      property="og:description"
      content="Story-led Philadelphia tours with route previews, narration, and browser AR field mode."
    />
    <meta property="og:type" content="website" />
    <title>Philly AR Tours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260401d" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <p class="eyebrow">Founders Threads</p>
          <h1>Philly AR Tours</h1>
        </div>
        <div class="topbar-actions">
          <button id="glasses-mode-button" type="button" class="ghost-button" data-action="toggle-glasses-mode">Bluetooth audio off</button>
        </div>
      </header>

      <main id="app" aria-live="polite"></main>

      <nav id="tabs" class="tabbar" aria-label="Primary">
        <button type="button" data-action="set-tab" data-tab="map" class="active">
          <span class="tabbar-icon">⌖</span>
          <span class="tabbar-label">Route</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="ar">
          <span class="tabbar-icon">◌</span>
          <span class="tabbar-label">AR</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="progress">
          <span class="tabbar-icon">◔</span>
          <span class="tabbar-label">Board</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="home">
          <span class="tabbar-icon">⌂</span>
          <span class="tabbar-label">Home</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="profile">
          <span class="tabbar-icon">⚙</span>
          <span class="tabbar-label">Settings</span>
        </button>
      </nav>
    </div>

    <script>
      (function () {
        var current = new URL(window.location.href);
        var host = String(current.hostname || "").toLowerCase();

        if (host === "api.philly-tours.com") {
          current.protocol = "https:";
          current.hostname = "philly-tours.com";
          current.port = "";
          window.location.replace(current.toString());
        }
      })();
    </script>
    <script src="/tours-data.js?v=20260401d"></script>
    <script src="/narration-data.js?v=20260401d"></script>
    <script src="/ar-data.js?v=20260401d"></script>
    <script src="/site-config.js?v=20260401d"></script>
    <script src="/site-config.local.js?v=20260409a"></script>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
      async
      defer
    ></script>
    <script src="/app.js?v=20260401d"></script>
  </body>
</html>
