<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#efe5d4" />
    <meta
      name="description"
      content="Explore story-driven Philadelphia tours with route previews, AR highlights, and progress tracking."
    />
    <meta property="og:title" content="Philly AR Tours" />
    <meta
      property="og:description"
      content="Story-led Philadelphia tours with route previews, narration, and browser AR field mode."
    />
    <meta property="og:type" content="website" />
    <title>Philly AR Tours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Philadelphia storyfinding</p>
          <h1>Philly AR Tours</h1>
        </div>
        <div class="topbar-actions">
          <span id="deploy-status" class="status-pill">Web preview</span>
          <button type="button" class="ghost-button" data-action="jump-featured">Open featured tour</button>
          <button id="copy-view-button" type="button" class="ghost-button" data-action="copy-view">Copy current view</button>
        </div>
      </header>

      <main id="app" aria-live="polite"></main>

      <nav id="tabs" class="tabbar" aria-label="Primary">
        <button type="button" data-action="set-tab" data-tab="home" class="active">Home</button>
        <button type="button" data-action="set-tab" data-tab="map">Route</button>
        <button type="button" data-action="set-tab" data-tab="ar">AR</button>
        <button type="button" data-action="set-tab" data-tab="progress">Progress</button>
        <button type="button" data-action="set-tab" data-tab="profile">Profile</button>
      </nav>
    </div>

    <script src="./tours-data.js"></script>
    <script src="./narration-data.js"></script>
    <script src="./ar-data.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
