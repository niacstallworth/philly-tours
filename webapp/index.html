<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07070d" />
    <meta
      name="description"
      content="Explore story-driven Philadelphia tours with cinematic route previews, AR highlights, and a premium mobile web companion."
    />
    <meta property="og:title" content="Philly AR Tours" />
    <meta
      property="og:description"
      content="Story-led Philadelphia tours with route previews, narration, and browser AR field mode."
    />
    <meta property="og:type" content="website" />
    <title>Philly AR Tours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=20260331d" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <p class="eyebrow">Founders Threads</p>
          <h1>Philly AR Tours</h1>
        </div>
        <div class="topbar-actions">
          <span id="deploy-status" class="status-pill">Web preview</span>
          <button id="glasses-mode-button" type="button" class="ghost-button" data-action="toggle-glasses-mode">AR glasses off</button>
          <button type="button" class="ghost-button" data-action="jump-featured">Featured route</button>
          <button id="copy-view-button" type="button" class="ghost-button" data-action="copy-view">Share view</button>
        </div>
      </header>

      <main id="app" aria-live="polite"></main>

      <nav id="tabs" class="tabbar" aria-label="Primary">
        <button type="button" data-action="set-tab" data-tab="home" class="active">
          <span class="tabbar-icon">⌂</span>
          <span class="tabbar-label">Home</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="map">
          <span class="tabbar-icon">⌖</span>
          <span class="tabbar-label">Route</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="ar">
          <span class="tabbar-icon">◌</span>
          <span class="tabbar-label">AR</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="progress">
          <span class="tabbar-icon">◔</span>
          <span class="tabbar-label">Board</span>
        </button>
        <button type="button" data-action="set-tab" data-tab="profile">
          <span class="tabbar-icon">⚙</span>
          <span class="tabbar-label">Settings</span>
        </button>
      </nav>
    </div>

    <script src="./tours-data.js?v=20260331d"></script>
    <script src="./narration-data.js?v=20260331d"></script>
    <script src="./ar-data.js?v=20260331d"></script>
    <script src="./site-config.js?v=20260331d"></script>
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
      async
      defer
    ></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js?v=20260331d"></script>
  </body>
</html>
